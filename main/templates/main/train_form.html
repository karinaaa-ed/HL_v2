<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запуск обучения модели</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #222;
            padding: 24px 12px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 20px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 26px;
        }

        .subtitle {
            margin: 0 0 18px;
            color: #555;
            line-height: 1.4;
        }

        form {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .hint {
            margin: 0 0 14px;
            font-size: 14px;
            color: #666;
        }

        button[type="submit"] {
            padding: 10px 14px;
            font-size: 15px;
            border: 1px solid #999;
            border-radius: 4px;
            background-color: #efefef;
            color: #222;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background-color: #e7e7e7;
        }

        .info {
            margin: 0;
            padding: 10px;
            background-color: #fafafa;
            border: 1px solid #e1e1e1;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.4;
        }

        code {
            background-color: #f0f0f0;
            padding: 1px 4px;
            border-radius: 3px;
            font-family: Consolas, monospace;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Запуск обучения модели</h1>
        <p class="subtitle">Укажите, сколько статей использовать для обучения.</p>

        <form method="POST" action="/train/">
            {% csrf_token %}
            <label for="num_articles">Количество статей для обучения</label>
            <input type="number" id="num_articles" name="num_articles" value="20000" min="1" step="1" required>
            <p class="hint">Рекомендуемое значение: 20 000.</p>
            <button type="submit">Запустить обучение</button>
        </form>

        <p class="info">
            После отправки формы задача будет поставлена в очередь. Статус можно смотреть по адресу <code>/status/&lt;task_id&gt;/</code>.
        </p>
    </main>
</body>
</html>
