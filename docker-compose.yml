version: "3.9"

services:
  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_DB: db-review
      POSTGRES_USER: review
      POSTGRES_PASSWORD: review123
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U review -d db-review" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - back-net

  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - back-net

  backend:
    build: .
    container_name: backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DEBUG: "False"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: db-review
      DB_USER: review
      DB_PASSWORD: review123
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,nginx
    volumes:
      - .:/app
      - static_data:/app/staticfiles
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn review2.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    networks:
      - back-net

  celery-worker:
    build: .
    container_name: celery-worker
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DEBUG: "False"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: db-review
      DB_USER: review
      DB_PASSWORD: review123
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
    command: celery -A review2 worker -l info
    healthcheck:
      test: [ "CMD-SHELL", "celery -A review2 inspect ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - back-net

  flower:
    build: .
    container_name: flower
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    command: celery -A review2 flower --port=5555
    ports:
      - "5555:5555"
    networks:
      - back-net

  static:
    image: nginx:1.27
    container_name: static
    depends_on:
      - backend
    volumes:
      - ./frontend/static-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/usr/share/nginx/html/static:ro
    networks:
      - back-net

  nginx:
    image: nginx:1.27
    container_name: nginx
    depends_on:
      - backend
      - static
    ports:
      - "8000:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - back-net

volumes:
  postgres_data:
  static_data:

networks:
  back-net:
    driver: bridge